# L9_META
# layer: ci
# role: seo_bot_engine
# status: active

name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ format('{0}://postgres:postgres@localhost:5432/seo_bot_test', 'postgresql') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build @l9/llm-router
        run: npm run build
        working-directory: packages/llm-router

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run
